<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Daily Slide Mahjong</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/df2e2e/ffffff?text=🀄">
    
    <style>
        :root {
            --bg-color: #1e293b;
            --board-color: #0f172a;
            --empty-slot: #1e293b;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        header {
            text-align: center;
            width: 100%;
            margin-top: 10px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        #score-board {
            font-size: 1rem;
            opacity: 0.8;
        }

        #game-container {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            background-color: var(--board-color);
            border-radius: 12px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 6px;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.3);
            position: relative;
        }

        .tile {
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.1rem; 
            font-weight: bold;
            color: #0f172a; 
            box-shadow: 0 4px 0 rgba(0,0,0,0.25), 0 6px 10px rgba(0,0,0,0.2);
            transition: transform 0.15s ease-in-out;
            position: relative;
            touch-action: none; 
        }

        .tile.empty {
            background-color: var(--empty-slot);
            border-radius: 6px;
            opacity: 0.15;
            border: 1px dashed rgba(255,255,255,0.1);
            box-shadow: none;
        }

        footer {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <header>
        <h1>Shift Mahjong Daily</h1>
        <div id="score-board">Tiles Remaining: <span id="tile-count">24</span></div>
    </header>

    <div id="game-container"></div>

    <footer>
        <button onclick="initGame()">New Board</button>
    </footer>

    <script>
        const GRID_SIZE = 6;
        const container = document.getElementById('game-container');
        const tileCountEl = document.getElementById('tile-count');
        
        const SYMBOLS = ['🀀', '🀁', '🀂', '🀃', '🀄', '🀅', '🀆', '🀇', '🀏', '🀕', '🀟', '🀤'];
        
        const COLOR_PALETTE = [
            '#f87171', '#fb923c', '#fbbf24', '#fde047', 
            '#a3e635', '#4ade80', '#2dd4bf', '#38bdf8', 
            '#60a5fa', '#818cf8', '#c084fc', '#f472b6'
        ];

        let grid = [];
        let touchStartX = 0;
        let touchStartY = 0;

        function initGame() {
            grid = Array(GRID_SIZE * GRID_SIZE).fill(null);
            
            let deck = [];
            SYMBOLS.forEach((sym, idx) => {
                deck.push({ text: sym, color: COLOR_PALETTE[idx] }); 
                deck.push({ text: sym, color: COLOR_PALETTE[idx] }); 
            });

            deck.sort(() => Math.random() - 0.5);

            let positions = [];
            while(positions.length < 24) {
                let r = Math.floor(Math.random() * 36);
                if(!positions.includes(r)) positions.push(r);
            }

            positions.forEach((pos, index) => {
                grid[pos] = deck[index];
            });

            renderBoard();
        }

        function renderBoard() {
            container.innerHTML = '';
            let remaining = 0;

            grid.forEach((tileData, index) => {
                const tileDiv = document.createElement('div');
                if (tileData) {
                    remaining++;
                    tileDiv.className = 'tile';
                    tileDiv.textContent = tileData.text;
                    tileDiv.style.background = tileData.color;
                    
                    tileDiv.addEventListener('touchstart', (e) => handleTouchStart(e), { passive: true });
                    tileDiv.addEventListener('touchend', (e) => handleTouchEnd(e, index), { passive: true });
                } else {
                    tileDiv.className = 'tile empty';
                }
                container.appendChild(tileDiv);
            });

            tileCountEl.textContent = remaining;
            if (remaining === 0) {
                setTimeout(() => alert('🎉 Board Cleared! Nice job!'), 300);
            }
        }

        function handleTouchStart(e) {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }

        function handleTouchEnd(e, index) {
            const deltaX = e.changedTouches[0].screenX - touchStartX;
            const deltaY = e.changedTouches[0].screenY - touchStartY;
            const swipeThreshold = 30; 

            if (Math.abs(deltaX) < swipeThreshold && Math.abs(deltaY) < swipeThreshold) {
                return; 
            }

            const boardSnapshot = grid.map(item => item ? { ...item } : null);
            let moved = false;

            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                // Horizontal Swipe
                const direction = deltaX > 0 ? 1 : -1;
                moved = processPartialSlide(index, direction, 'horizontal');
            } else {
                // Vertical Swipe
                const direction = deltaY > 0 ? GRID_SIZE : -GRID_SIZE;
                moved = processPartialSlide(index, direction, 'vertical');
            }

            if (moved) {
                renderBoard();
                let hasMatches = checkMatches(true); 
                
                if (!hasMatches) {
                    setTimeout(() => {
                        grid = boardSnapshot;
                        renderBoard();
                    }, 150);
                } else {
                    setTimeout(() => {
                        checkMatches(false);
                    }, 100);
                }
            }
        }

        function processPartialSlide(startIndex, step, axis) {
            let row = Math.floor(startIndex / GRID_SIZE);
            let col = startIndex % GRID_SIZE;

            // 1. Gather all indices in front of the selected tile in swipe direction
            let trackIndices = [];
            let current = startIndex;

            while (true) {
                current += step;
                if (current < 0 || current >= GRID_SIZE * GRID_SIZE) break;
                if (axis === 'horizontal' && Math.floor(current / GRID_SIZE) !== row) break;
                trackIndices.push(current);
            }

            if (trackIndices.length === 0) return false;

            // 2. Locate the contiguous group of solid tiles starting directly from our selection
            let movingBlockIndices = [startIndex];
            for (let idx of trackIndices) {
                if (grid[idx] !== null) {
                    movingBlockIndices.push(idx);
                } else {
                    break; // Met an empty slot, stop building the tile stack
                }
            }

            // 3. Count how many empty slots exist sequentially *after* our built block
            let remainingTrack = trackIndices.slice(movingBlockIndices.length - 1);
            let emptySpacesAhead = 0;
            for (let idx of remainingTrack) {
                if (grid[idx] === null) {
                    emptySpacesAhead++;
                } else {
                    break; // Hit another stationary obstacle tile downstream
                }
            }

            // If there is no open floor ahead to move into, the slide action is blocked
            if (emptySpacesAhead === 0) return false;

            // 4. Execute shifting layout modifications in reverse order to prevent overwriting values
            let reverseBlock = [...movingBlockIndices].reverse();
            reverseBlock.forEach(idx => {
                grid[idx + (step * emptySpacesAhead)] = grid[idx];
                grid[idx] = null;
            });

            return true;
        }

        function checkMatches(dryRun = false) {
            let matched = false;
            let toRemove = new Set();
            
            for (let i = 0; i < grid.length; i++) {
                if (!grid[i]) continue;

                let row = Math.floor(i / GRID_SIZE);
                let col = i % GRID_SIZE;

                if (col < GRID_SIZE - 1 && grid[i + 1] && grid[i].text === grid[i + 1].text) {
                    toRemove.add(i);
                    toRemove.add(i + 1);
                    matched = true;
                }
                if (row < GRID_SIZE - 1 && grid[i + GRID_SIZE] && grid[i].text === grid[i + GRID_SIZE].text) {
                    toRemove.add(i);
                    toRemove.add(i + GRID_SIZE);
                    matched = true;
                }
            }

            if (dryRun) return matched;

            toRemove.forEach(idx => {
                grid[idx] = null;
            });

            if (matched) {
                renderBoard();
                setTimeout(() => checkMatches(false), 150); 
            }
        }

        initGame();
    </script>
</body>
</html>
