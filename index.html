<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Daily Slide Mahjong</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/df2e2e/ffffff?text=🀄">
    
    <style>
        :root {
            --bg-color: #1e293b;
            --board-color: #0f172a;
            --tile-color: #f8fafc;
            --tile-text: #0f172a;
            --tile-shadow: #cbd5e1;
            --empty-slot: #1e293b;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        header {
            text-align: center;
            width: 100%;
            margin-top: 10px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        #score-board {
            font-size: 1rem;
            opacity: 0.8;
        }

        #game-container {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            background-color: var(--board-color);
            border-radius: 12px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 6px;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.3);
            position: relative;
        }

        .tile {
            background: linear-gradient(145deg, var(--tile-color), #e2e8f0);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--tile-text);
            box-shadow: 0 4px 0 var(--tile-shadow), 0 6px 10px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            position: relative;
            touch-action: none; /* Block browser panning while swiping tiles */
        }

        .tile.selected {
            transform: scale(0.95);
            background: #fef08a;
            box-shadow: 0 2px 0 #fde047;
        }

        .tile.empty {
            background-color: var(--empty-slot);
            border-radius: 6px;
            opacity: 0.25;
            border: 1px dashed rgba(255,255,255,0.1);
        }

        footer {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <header>
        <h1>Slide Mahjong Daily</h1>
        <div id="score-board">Tiles Remaining: <span id="tile-count">24</span></div>
    </header>

    <div id="game-container"></div>

    <footer>
        <button onclick="initGame()">New Board</button>
    </footer>

    <script>
        const GRID_SIZE = 6;
        const container = document.getElementById('game-container');
        const tileCountEl = document.getElementById('tile-count');
        
        const SYMBOLS = ['🀀', '🀁', '🀂', '🀃', '🀄', '🀅', '🀆', '🀇', '🀏', '🀕', '🀟', '🀤'];
        
        let grid = [];
        let selectedTile = null;

        // Variables to keep track of swipe gestures
        let touchStartX = 0;
        let touchStartY = 0;

        function initGame() {
            grid = Array(GRID_SIZE * GRID_SIZE).fill(null);
            selectedTile = null;
            
            let deck = [];
            SYMBOLS.forEach(sym => {
                deck.push(sym, sym); 
            });

            deck.sort(() => Math.random() - 0.5);

            let positions = [];
            while(positions.length < 24) {
                let r = Math.floor(Math.random() * 36);
                if(!positions.includes(r)) positions.push(r);
            }

            positions.forEach((pos, index) => {
                grid[pos] = deck[index];
            });

            renderBoard();
        }

        function renderBoard() {
            container.innerHTML = '';
            let remaining = 0;

            grid.forEach((symbol, index) => {
                const tileDiv = document.createElement('div');
                if (symbol) {
                    remaining++;
                    tileDiv.className = 'tile';
                    tileDiv.textContent = symbol;
                    tileDiv.dataset.index = index;
                    
                    // Add touch listeners for swipe tracking
                    tileDiv.addEventListener('touchstart', (e) => handleTouchStart(e, index), { passive: true });
                    tileDiv.addEventListener('touchend', (e) => handleTouchEnd(e, index), { passive: true });
                    
                    // Fallback tap handling
                    tileDiv.addEventListener('click', () => handleTileTap(index));
                } else {
                    tileDiv.className = 'tile empty';
                    // Allow tapping an empty slot as an alternative destination
                    tileDiv.addEventListener('click', () => handleEmptySpaceTap(index));
                }
                container.appendChild(tileDiv);
            });

            tileCountEl.textContent = remaining;
            if (remaining === 0) {
                setTimeout(() => alert('🎉 Board Cleared! Nice job!'), 300);
            }
        }

        // Capture starting coordinate of a swipe
        function handleTouchStart(e, index) {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
            selectedTile = index; 
        }

        // Calculate swipe direction on lift
        function handleTouchEnd(e, index) {
            const deltaX = e.changedTouches[0].screenX - touchStartX;
            const deltaY = e.changedTouches[0].screenY - touchStartY;
            
            // Set a minimum threshold for swipe distance (in pixels)
            const swipeThreshold = 30; 

            if (Math.abs(deltaX) < swipeThreshold && Math.abs(deltaY) < swipeThreshold) {
                return; // It was just a tap, handle separately
            }

            let targetIndex = -1;
            let row = Math.floor(index / GRID_SIZE);
            let col = index % GRID_SIZE;

            // Determine primary swipe vector (Horizontal vs Vertical)
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                if (deltaX > 0) {
                    // Swipe Right -> target the edge of the row
                    targetIndex = (row * GRID_SIZE) + (GRID_SIZE - 1);
                } else {
                    // Swipe Left -> target the start of the row
                    targetIndex = row * GRID_SIZE;
                }
            } else {
                if (deltaY > 0) {
                    // Swipe Down -> target the bottom edge of the column
                    targetIndex = ((GRID_SIZE - 1) * GRID_SIZE) + col;
                } else {
                    // Swipe Up -> target the top edge of the column
                    targetIndex = col;
                }
            }

            if (targetIndex !== -1 && targetIndex !== index) {
                if (attemptMove(index, targetIndex)) {
                    selectedTile = null;
                    checkMatches();
                }
            }
        }

        // Fallback tap control logic for simple combos
        function handleTileTap(index) {
            if (selectedTile !== null && selectedTile !== index) {
                if (attemptMove(selectedTile, index)) {
                    selectedTile = null;
                    checkMatches();
                    return;
                }
            }
            selectedTile = index;
            renderBoard();
            const selectedEl = document.querySelector(`[data-index='${index}']`);
            if (selectedEl) selectedEl.classList.add('selected');
        }

        function handleEmptySpaceTap(index) {
            if (selectedTile !== null) {
                if (attemptMove(selectedTile, index)) {
                    selectedTile = null;
                    checkMatches();
                }
            }
        }

        function attemptMove(fromIdx, toIdx) {
            let fromRow = Math.floor(fromIdx / GRID_SIZE);
            let fromCol = fromIdx % GRID_SIZE;
            let toRow = Math.floor(toIdx / GRID_SIZE);
            let toCol = toIdx % GRID_SIZE;

            if (fromRow !== toRow && fromCol !== toCol) return false;

            let step = 0;
            if (fromRow === toRow) {
                step = fromCol < toCol ? 1 : -1;
            } else {
                step = fromRow < toRow ? GRID_SIZE : -GRID_SIZE;
            }

            let current = fromIdx;
            let targetSpot = fromIdx;

            while (true) {
                let next = current + step;
                
                if (fromRow === toRow && Math.floor(next / GRID_SIZE) !== fromRow) break;
                if (next < 0 || next >= GRID_SIZE * GRID_SIZE) break;

                if (grid[next] !== null) {
                    // If it hits an identical matching tile, wipe them out
                    if (grid[next] === grid[fromIdx]) {
                        grid[next] = null;
                        grid[fromIdx] = null;
                        return true;
                    }
                    break;
                }

                targetSpot = next;
                current = next;
            }

            if (targetSpot !== fromIdx) {
                grid[targetSpot] = grid[fromIdx];
                grid[fromIdx] = null;
                return true;
            }

            return false;
        }

        function checkMatches() {
            let matched = false;
            
            for (let i = 0; i < grid.length; i++) {
                if (!grid[i]) continue;

                let row = Math.floor(i / GRID_SIZE);
                let col = i % GRID_SIZE;

                if (col < GRID_SIZE - 1 && grid[i] === grid[i + 1]) {
                    grid[i] = null;
                    grid[i + 1] = null;
                    matched = true;
                }
                if (row < GRID_SIZE - 1 && grid[i] === grid[i + GRID_SIZE]) {
                    grid[i] = null;
                    grid[i + GRID_SIZE] = null;
                    matched = true;
                }
            }

            renderBoard();
            if (matched) {
                setTimeout(checkMatches, 150);
            }
        }

        initGame();
    </script>
</body>
</html>
