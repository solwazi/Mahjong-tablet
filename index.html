<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Daily Slide Mahjong</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/df2e2e/ffffff?text=🀄">
    
    <style>
        :root {
            --bg-color: #1e293b;
            --board-color: #0f172a;
            --tile-color: #f8fafc;
            --tile-text: #0f172a;
            --tile-shadow: #cbd5e1;
            --empty-slot: #1e293b;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        header {
            text-align: center;
            width: 100%;
            margin-top: 10px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        #score-board {
            font-size: 1rem;
            opacity: 0.8;
        }

        #game-container {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            background-color: var(--board-color);
            border-radius: 12px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 6px;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.3);
            position: relative;
        }

        .tile {
            background: linear-gradient(145deg, var(--tile-color), #e2e8f0);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--tile-text);
            box-shadow: 0 4px 0 var(--tile-shadow), 0 6px 10px rgba(0,0,0,0.15);
            transition: transform 0.15s ease-in-out;
            position: relative;
            touch-action: none; 
        }

        .tile.empty {
            background-color: var(--empty-slot);
            border-radius: 6px;
            opacity: 0.15;
            border: 1px dashed rgba(255,255,255,0.1);
            box-shadow: none;
        }

        footer {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <header>
        <h1>Shift Mahjong Daily</h1>
        <div id="score-board">Tiles Remaining: <span id="tile-count">24</span></div>
    </header>

    <div id="game-container"></div>

    <footer>
        <button onclick="initGame()">New Board</button>
    </footer>

    <script>
        const GRID_SIZE = 6;
        const container = document.getElementById('game-container');
        const tileCountEl = document.getElementById('tile-count');
        
        const SYMBOLS = ['🀀', '🀁', '🀂', '🀃', '🀄', '🀅', '🀆', '🀇', '🀏', '🀕', '🀟', '🀤'];
        
        let grid = [];
        let touchStartX = 0;
        let touchStartY = 0;

        function initGame() {
            grid = Array(GRID_SIZE * GRID_SIZE).fill(null);
            
            let deck = [];
            SYMBOLS.forEach(sym => {
                deck.push(sym, sym); 
            });

            deck.sort(() => Math.random() - 0.5);

            let positions = [];
            while(positions.length < 24) {
                let r = Math.floor(Math.random() * 36);
                if(!positions.includes(r)) positions.push(r);
            }

            positions.forEach((pos, index) => {
                grid[pos] = deck[index];
            });

            renderBoard();
        }

        function renderBoard() {
            container.innerHTML = '';
            let remaining = 0;

            grid.forEach((symbol, index) => {
                const tileDiv = document.createElement('div');
                if (symbol) {
                    remaining++;
                    tileDiv.className = 'tile';
                    tileDiv.textContent = symbol;
                    
                    tileDiv.addEventListener('touchstart', (e) => handleTouchStart(e), { passive: true });
                    tileDiv.addEventListener('touchend', (e) => handleTouchEnd(e, index), { passive: true });
                } else {
                    tileDiv.className = 'tile empty';
                }
                container.appendChild(tileDiv);
            });

            tileCountEl.textContent = remaining;
            if (remaining === 0) {
                setTimeout(() => alert('🎉 Board Cleared! Nice job!'), 300);
            }
        }

        function handleTouchStart(e) {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }

        function handleTouchEnd(e, index) {
            const deltaX = e.changedTouches[0].screenX - touchStartX;
            const deltaY = e.changedTouches[0].screenY - touchStartY;
            const swipeThreshold = 30; 

            if (Math.abs(deltaX) < swipeThreshold && Math.abs(deltaY) < swipeThreshold) {
                return; 
            }

            let row = Math.floor(index / GRID_SIZE);
            let col = index % GRID_SIZE;

            // Take a backup snapshot of the board state before the shift happens
            const boardSnapshot = [...grid];

            let shifted = false;
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                if (deltaX > 0) shifted = shiftRow(row, 'right');
                else shifted = shiftRow(row, 'left');
            } else {
                if (deltaY > 0) shifted = shiftColumn(col, 'down');
                else shifted = shiftColumn(col, 'up');
            }

            // If the row/col actually shifted space, evaluate if it produced matches
            if (shifted) {
                renderBoard();
                
                // Check if matches were generated by this layout move
                let hasMatches = checkMatches(true); // run a dry test pass first
                
                if (!hasMatches) {
                    // No match found! Revert back to original layout positions immediately
                    setTimeout(() => {
                        grid = boardSnapshot;
                        renderBoard();
                    }, 150);
                } else {
                    // Match found! Run full match elimination sequence
                    setTimeout(() => {
                        checkMatches(false);
                    }, 100);
                }
            }
        }

        function shiftRow(rowNum, direction) {
            let rowIndices = [];
            for (let c = 0; c < GRID_SIZE; c++) {
                rowIndices.push(rowNum * GRID_SIZE + c);
            }
            let rowValues = rowIndices.map(idx => grid[idx]);

            if (direction === 'right' && rowValues[GRID_SIZE - 1] === null) {
                rowValues.pop();
                rowValues.unshift(null);
                rowIndices.forEach((gridIdx, i) => grid[gridIdx] = rowValues[i]);
                return true;
            } else if (direction === 'left' && rowValues[0] === null) {
                rowValues.shift();
                rowValues.push(null);
                rowIndices.forEach((gridIdx, i) => grid[gridIdx] = rowValues[i]);
                return true;
            }
            return false;
        }

        function shiftColumn(colNum, direction) {
            let colIndices = [];
            for (let r = 0; r < GRID_SIZE; r++) {
                colIndices.push(r * GRID_SIZE + colNum);
            }
            let colValues = colIndices.map(idx => grid[idx]);

            if (direction === 'down' && colValues[GRID_SIZE - 1] === null) {
                colValues.pop();
                colValues.unshift(null);
                colIndices.forEach((gridIdx, i) => grid[gridIdx] = colValues[i]);
                return true;
            } else if (direction === 'up' && colValues[0] === null) {
                colValues.shift();
                colValues.push(null);
                colIndices.forEach((gridIdx, i) => grid[gridIdx] = colValues[i]);
                return true;
            }
            return false;
        }

        // Handles match detection. dryRun flag returns true/false without deleting anything.
        function checkMatches(dryRun = false) {
            let matched = false;
            let toRemove = new Set();
            
            for (let i = 0; i < grid.length; i++) {
                if (!grid[i]) continue;

                let row = Math.floor(i / GRID_SIZE);
                let col = i % GRID_SIZE;

                if (col < GRID_SIZE - 1 && grid[i] === grid[i + 1]) {
                    toRemove.add(i);
                    toRemove.add(i + 1);
                    matched = true;
                }
                if (row < GRID_SIZE - 1 && grid[i] === grid[i + GRID_SIZE]) {
                    toRemove.add(i);
                    toRemove.add(i + GRID_SIZE);
                    matched = true;
                }
            }

            if (dryRun) {
                return matched;
            }

            // Real validation run: execute actual removals
            toRemove.forEach(idx => {
                grid[idx] = null;
            });

            if (matched) {
                renderBoard();
                // Cascade checks in case falling fragments form secondary chain matches
                setTimeout(() => checkMatches(false), 150); 
            }
        }

        initGame();
    </script>
</body>
</html>
